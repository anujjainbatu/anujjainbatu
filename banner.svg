<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 320" width="1200" height="320" preserveAspectRatio="xMidYMid meet" font-family="'SFMono-Regular','Segoe UI',-apple-system,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <!-- gradients -->
    <linearGradient id="coralText" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF9E6D"/>
      <stop offset="0.55" stop-color="#FF6D5A"/>
      <stop offset="1" stop-color="#EA4B71"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E1E2B"/>
      <stop offset="1" stop-color="#13131C"/>
    </linearGradient>
    <radialGradient id="blob" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#EA4B71" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#EA4B71" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <!-- dot grid -->
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#FFFFFF" fill-opacity="0.045"/>
    </pattern>
    <!-- soft glow -->
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="typeClip"><rect x="84" y="221" height="24" width="0"><animate attributeName="width" values="0;504;504" keyTimes="0;0.62;1" dur="4.2s" begin="0.3s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="card"><rect x="0" y="0" width="1200" height="320" rx="24"/></clipPath>
  </defs>

  <!-- canvas -->
  <g clip-path="url(#card)">
    <rect x="0" y="0" width="1200" height="320" fill="#0B0B12"/>
    <rect x="0" y="0" width="1200" height="320" fill="url(#dots)"/>
    <ellipse cx="1040" cy="60" rx="420" ry="300" fill="url(#blob)"/>
    <ellipse cx="120" cy="300" rx="360" ry="240" fill="url(#blob2)"/>

    <!-- faint background flow lines -->
    <g stroke="#EA4B71" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.10">
      <path d="M-20,50 C300,20 620,90 1220,44" stroke-dasharray="2 16"><animate attributeName="stroke-dashoffset" from="0" to="-180" dur="6s" repeatCount="indefinite"/></path>
      <path d="M-20,286 C360,320 720,250 1220,300" stroke-dasharray="2 16"><animate attributeName="stroke-dashoffset" from="0" to="-180" dur="7.5s" repeatCount="indefinite"/></path>
    </g>
    <!-- top accent hairline -->
    <rect x="0" y="0" width="1200" height="3" fill="url(#coralText)" opacity="0.9"/>

    <!-- ===== left: identity ===== -->
    <text x="62" y="118" font-size="66" font-weight="800" fill="url(#coralText)" letter-spacing="-1">Anuj Jain</text>
    <text x="65" y="156" font-size="19" font-weight="600" fill="#EA4B71" letter-spacing="4">AI SOLUTIONS ENGINEER</text>

    <!-- typed terminal line -->
    <text x="62" y="240" font-size="18" font-weight="700" fill="#FF6D5A" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace">$</text>
    <g clip-path="url(#typeClip)">
      <text x="88" y="240" font-size="18" fill="#C9C9D6" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace">building production AI systems, not prototypes</text>
    </g>
    <rect x="88" y="224" width="2.5" height="20" fill="#FF6D5A">
      <animate attributeName="x" values="88;592;592;88;88" keyTimes="0;0.62;0.78;0.92;1" dur="4.2s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1s" repeatCount="indefinite"/>
    </rect>

    <text x="64" y="282" font-size="13" fill="#7C7C90" letter-spacing="1.5" font-family="'SFMono-Regular',Consolas,monospace">Enterprise AI  ·  AI Agents  ·  MCP  ·  Voice AI  ·  Solution Architecture</text>

    <!-- ===== right: mini node-graph motif ===== -->
    <g stroke-linecap="round" fill="none">
      <path id="m1" d="M904,113 C934,113 922,158 952,158" stroke="#EA4B71" stroke-width="1.8" opacity="0.4"/>
      <path id="m2" d="M904,197 C934,197 922,158 952,158" stroke="#38BDF8" stroke-width="1.8" opacity="0.4"/>
      <path id="m3" d="M1048,158 C1072,158 1072,113 1096,113" stroke="#2DD4BF" stroke-width="1.8" opacity="0.4"/>
      <path id="m4" d="M1048,158 C1072,158 1072,197 1096,197" stroke="#34D399" stroke-width="1.8" opacity="0.4"/>
    </g>

    <!-- hub glow -->
    <circle cx="1000" cy="158" r="40" fill="#8B5CF6" opacity="0.18">
      <animate attributeName="r" values="34;46;34" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.12;0.28;0.12" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- decorative node cards -->
    <!-- N1 coral -->
    <g><rect x="820" y="98" width="84" height="30" rx="8" fill="url(#nodeGrad)" stroke="#EA4B71" stroke-opacity="0.45" stroke-width="1.1"/><rect x="828" y="105" width="16" height="16" rx="4" fill="#EA4B71"/><rect x="850" y="108" width="42" height="3.4" rx="1.7" fill="#3A3A48"/><rect x="850" y="115" width="30" height="3.4" rx="1.7" fill="#2C2C38"/></g>
    <!-- N3 blue -->
    <g><rect x="820" y="182" width="84" height="30" rx="8" fill="url(#nodeGrad)" stroke="#38BDF8" stroke-opacity="0.45" stroke-width="1.1"/><rect x="828" y="189" width="16" height="16" rx="4" fill="#38BDF8"/><rect x="850" y="192" width="42" height="3.4" rx="1.7" fill="#3A3A48"/><rect x="850" y="199" width="30" height="3.4" rx="1.7" fill="#2C2C38"/></g>
    <!-- Hub violet -->
    <g><rect x="952" y="140" width="96" height="36" rx="10" fill="url(#nodeGrad)" stroke="#8B5CF6" stroke-opacity="0.7" stroke-width="1.3"/>
      <g transform="translate(972,158)" stroke="#C4B5FD" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0,-7 L1.8,-1.8 L7,0 L1.8,1.8 L0,7 L-1.8,1.8 L-7,0 L-1.8,-1.8 Z" fill="#8B5CF6" fill-opacity="0.5"/>
      </g>
      <rect x="988" y="150" width="50" height="3.6" rx="1.8" fill="#4A3F63"/><rect x="988" y="158" width="38" height="3.6" rx="1.8" fill="#3A3350"/><rect x="988" y="166" width="44" height="3.6" rx="1.8" fill="#332C48"/>
    </g>
    <!-- N4 teal -->
    <g><rect x="1096" y="98" width="84" height="30" rx="8" fill="url(#nodeGrad)" stroke="#2DD4BF" stroke-opacity="0.45" stroke-width="1.1"/><rect x="1104" y="105" width="16" height="16" rx="4" fill="#2DD4BF"/><rect x="1126" y="108" width="42" height="3.4" rx="1.7" fill="#3A3A48"/><rect x="1126" y="115" width="30" height="3.4" rx="1.7" fill="#2C2C38"/></g>
    <!-- N5 green -->
    <g><rect x="1096" y="182" width="84" height="30" rx="8" fill="url(#nodeGrad)" stroke="#34D399" stroke-opacity="0.45" stroke-width="1.1"/><rect x="1104" y="189" width="16" height="16" rx="4" fill="#34D399"/><rect x="1126" y="192" width="42" height="3.4" rx="1.7" fill="#3A3A48"/><rect x="1126" y="199" width="30" height="3.4" rx="1.7" fill="#2C2C38"/></g>

    <!-- ports -->
    <g fill="#0B0B12" stroke-width="1.4">
      <circle cx="904" cy="113" r="3" stroke="#EA4B71"/><circle cx="904" cy="197" r="3" stroke="#38BDF8"/>
      <circle cx="952" cy="158" r="3.2" stroke="#8B5CF6"/><circle cx="1048" cy="158" r="3.2" stroke="#8B5CF6"/>
      <circle cx="1096" cy="113" r="3" stroke="#2DD4BF"/><circle cx="1096" cy="197" r="3" stroke="#34D399"/>
    </g>

    <!-- flowing data dots -->
    <circle r="3.4" fill="#EA4B71" filter="url(#glow)"><animateMotion dur="2.6s" begin="0s" repeatCount="indefinite"><mpath xlink:href="#m1"/></animateMotion></circle>
    <circle r="3.4" fill="#38BDF8" filter="url(#glow)"><animateMotion dur="2.6s" begin="0.7s" repeatCount="indefinite"><mpath xlink:href="#m2"/></animateMotion></circle>
    <circle r="3.4" fill="#2DD4BF" filter="url(#glow)"><animateMotion dur="2.6s" begin="1.1s" repeatCount="indefinite"><mpath xlink:href="#m3"/></animateMotion></circle>
    <circle r="3.4" fill="#34D399" filter="url(#glow)"><animateMotion dur="2.6s" begin="1.7s" repeatCount="indefinite"><mpath xlink:href="#m4"/></animateMotion></circle>
  </g>
</svg>
