<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 520" width="1200" height="520" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI',-apple-system,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E1E2B"/>
      <stop offset="1" stop-color="#12121B"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241E38"/>
      <stop offset="1" stop-color="#181427"/>
    </linearGradient>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#FFFFFF" fill-opacity="0.04"/>
    </pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="frame"><rect x="0" y="0" width="1200" height="520" rx="20"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="520" fill="#0B0B12"/>
    <rect width="1200" height="520" fill="url(#grid)"/>
    <ellipse cx="600" cy="260" rx="260" ry="220" fill="url(#hubGlow)" opacity="0.5"/>

    <!-- caption -->
    <circle cx="30" cy="30" r="4.5" fill="#34D399"><animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/></circle>
    <text x="44" y="34" font-size="13" fill="#7A7A8E" letter-spacing="1" font-family="'SFMono-Regular',Consolas,monospace">live workflow · AI systems architecture</text>
    <text x="1176" y="34" text-anchor="end" font-size="12" fill="#5A5A6E" letter-spacing="1" font-family="'SFMono-Regular',Consolas,monospace">@anujjainbatu</text>

    <!-- ================= CONNECTIONS ================= -->
    <g fill="none" stroke-linecap="round">
      <path id="c1" d="M240,160 C360,160 365,260 485,260" stroke="#EA4B71" stroke-width="2" opacity="0.28"/>
      <path id="c2" d="M240,260 C345,260 380,260 485,260" stroke="#EA4B71" stroke-width="2" opacity="0.28"/>
      <path id="c3" d="M240,360 C360,360 365,260 485,260" stroke="#EA4B71" stroke-width="2" opacity="0.28"/>
      <path id="c4" d="M715,260 C835,260 825,120 945,120" stroke="#38BDF8" stroke-width="2" opacity="0.28"/>
      <path id="c5" d="M715,260 C835,260 825,220 945,220" stroke="#2DD4BF" stroke-width="2" opacity="0.28"/>
      <path id="c6" d="M715,260 C835,260 825,320 945,320" stroke="#FBBF24" stroke-width="2" opacity="0.28"/>
      <path id="c7" d="M715,260 C835,260 825,420 945,420" stroke="#34D399" stroke-width="2" opacity="0.28"/>
    </g>

    <!-- ================= SOURCE NODES ================= -->
    <!-- WhatsApp -->
    <g filter="url(#shadow)">
      <rect x="70" y="132" width="170" height="56" rx="12" fill="url(#nodeGrad)" stroke="#EA4B71" stroke-opacity="0.4" stroke-width="1.2"/>
      <rect x="82" y="143" width="34" height="34" rx="9" fill="#EA4B71" fill-opacity="0.16" stroke="#EA4B71" stroke-opacity="0.5"/>
      <g transform="translate(99,160)" stroke="#EA4B71" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M-8,-6 h13 a3,3 0 0 1 3,3 v6 a3,3 0 0 1 -3,3 h-9 l-4,4 v-4 a3,3 0 0 1 -3,-3 v-6 a3,3 0 0 1 3,-3 Z"/>
      </g>
      <text x="128" y="158" font-size="15" font-weight="600" fill="#EAEAF2">WhatsApp</text>
      <text x="128" y="174" font-size="11" fill="#8A8A9E" font-family="'SFMono-Regular',Consolas,monospace">Interakt · trigger</text>
    </g>
    <!-- Meta Ads -->
    <g filter="url(#shadow)">
      <rect x="70" y="232" width="170" height="56" rx="12" fill="url(#nodeGrad)" stroke="#EA4B71" stroke-opacity="0.4" stroke-width="1.2"/>
      <rect x="82" y="243" width="34" height="34" rx="9" fill="#EA4B71" fill-opacity="0.16" stroke="#EA4B71" stroke-opacity="0.5"/>
      <g transform="translate(99,260)" stroke="#EA4B71" stroke-width="1.7" fill="none">
        <circle cx="-3.5" cy="0" r="5.5"/><circle cx="3.5" cy="0" r="5.5"/>
      </g>
      <text x="128" y="258" font-size="15" font-weight="600" fill="#EAEAF2">Meta Ads</text>
      <text x="128" y="274" font-size="11" fill="#8A8A9E" font-family="'SFMono-Regular',Consolas,monospace">lead forms</text>
    </g>
    <!-- Shopify -->
    <g filter="url(#shadow)">
      <rect x="70" y="332" width="170" height="56" rx="12" fill="url(#nodeGrad)" stroke="#EA4B71" stroke-opacity="0.4" stroke-width="1.2"/>
      <rect x="82" y="343" width="34" height="34" rx="9" fill="#EA4B71" fill-opacity="0.16" stroke="#EA4B71" stroke-opacity="0.5"/>
      <g transform="translate(99,360)" stroke="#EA4B71" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M-6,-3 h12 l1.5,10 h-15 Z"/><path d="M-3,-3 a3,3 0 0 1 6,0"/>
      </g>
      <text x="128" y="358" font-size="15" font-weight="600" fill="#EAEAF2">Shopify</text>
      <text x="128" y="374" font-size="11" fill="#8A8A9E" font-family="'SFMono-Regular',Consolas,monospace">8 stores · events</text>
    </g>

    <!-- ================= AI HUB ================= -->
    <circle cx="600" cy="260" r="90" fill="url(#hubGlow)">
      <animate attributeName="r" values="78;98;78" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <g filter="url(#shadow)">
      <rect x="485" y="212" width="230" height="96" rx="18" fill="url(#hubGrad)" stroke="#8B5CF6" stroke-opacity="0.75" stroke-width="1.6"/>
      <rect x="485" y="212" width="230" height="96" rx="18" fill="none" stroke="#8B5CF6" stroke-opacity="0.25" stroke-width="1.6">
        <animate attributeName="stroke-opacity" values="0.1;0.5;0.1" dur="3.4s" repeatCount="indefinite"/>
      </rect>
      <!-- sparkle icon -->
      <g transform="translate(527,260)">
        <rect x="-22" y="-22" width="44" height="44" rx="11" fill="#8B5CF6" fill-opacity="0.16" stroke="#8B5CF6" stroke-opacity="0.55"/>
        <path d="M0,-13 L3.2,-3.2 L13,0 L3.2,3.2 L0,13 L-3.2,3.2 L-13,0 L-3.2,-3.2 Z" fill="#8B5CF6" fill-opacity="0.55" stroke="#C4B5FD" stroke-width="1.4" stroke-linejoin="round">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
        </path>
        <circle cx="9" cy="-9" r="1.6" fill="#C4B5FD"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
      </g>
      <text x="562" y="252" font-size="21" font-weight="700" fill="#F3F0FF">AI Agent</text>
      <text x="562" y="274" font-size="12" fill="#B7A9E0" font-family="'SFMono-Regular',Consolas,monospace">LLM · MCP · tools</text>
      <text x="562" y="292" font-size="11" fill="#8579B0" font-family="'SFMono-Regular',Consolas,monospace">orchestration engine</text>
    </g>

    <!-- ================= OUTCOME NODES ================= -->
    <!-- Voice AI -->
    <g filter="url(#shadow)">
      <rect x="945" y="92" width="185" height="56" rx="12" fill="url(#nodeGrad)" stroke="#38BDF8" stroke-opacity="0.4" stroke-width="1.2"/>
      <rect x="957" y="103" width="34" height="34" rx="9" fill="#38BDF8" fill-opacity="0.16" stroke="#38BDF8" stroke-opacity="0.5"/>
      <g transform="translate(974,120)" stroke="#38BDF8" stroke-width="2" stroke-linecap="round">
        <line x1="-7" y1="-3" x2="-7" y2="3"/><line x1="-2.5" y1="-7" x2="-2.5" y2="7"/><line x1="2.5" y1="-9" x2="2.5" y2="9"/><line x1="7" y1="-4" x2="7" y2="4"/>
      </g>
      <text x="1003" y="118" font-size="15" font-weight="600" fill="#EAEAF2">Voice AI</text>
      <text x="1003" y="134" font-size="11" fill="#8A8A9E" font-family="'SFMono-Regular',Consolas,monospace">ElevenLabs</text>
    </g>
    <!-- CRM Sync -->
    <g filter="url(#shadow)">
      <rect x="945" y="192" width="185" height="56" rx="12" fill="url(#nodeGrad)" stroke="#2DD4BF" stroke-opacity="0.4" stroke-width="1.2"/>
      <rect x="957" y="203" width="34" height="34" rx="9" fill="#2DD4BF" fill-opacity="0.16" stroke="#2DD4BF" stroke-opacity="0.5"/>
      <g transform="translate(974,220)" stroke="#2DD4BF" stroke-width="1.6" fill="none">
        <circle cx="-4" cy="-3" r="3"/><circle cx="4" cy="-3" r="3"/><path d="M-9,7 a5,5 0 0 1 10,0 M-1,7 a5,5 0 0 1 10,0" stroke-linecap="round"/>
      </g>
      <text x="1003" y="218" font-size="15" font-weight="600" fill="#EAEAF2">CRM Sync</text>
      <text x="1003" y="234" font-size="11" fill="#8A8A9E" font-family="'SFMono-Regular',Consolas,monospace">GoHighLevel</text>
    </g>
    <!-- Analytics -->
    <g filter="url(#shadow)">
      <rect x="945" y="292" width="185" height="56" rx="12" fill="url(#nodeGrad)" stroke="#FBBF24" stroke-opacity="0.4" stroke-width="1.2"/>
      <rect x="957" y="303" width="34" height="34" rx="9" fill="#FBBF24" fill-opacity="0.16" stroke="#FBBF24" stroke-opacity="0.5"/>
      <g transform="translate(974,320)" stroke="#FBBF24" stroke-width="2" stroke-linecap="round">
        <line x1="-7" y1="6" x2="-7" y2="0"/><line x1="0" y1="6" x2="0" y2="-4"/><line x1="7" y1="6" x2="7" y2="-7"/>
      </g>
      <text x="1003" y="318" font-size="15" font-weight="600" fill="#EAEAF2">Analytics</text>
      <text x="1003" y="334" font-size="11" fill="#8A8A9E" font-family="'SFMono-Regular',Consolas,monospace">Ads · KPIs</text>
    </g>
    <!-- Revenue -->
    <g filter="url(#shadow)">
      <rect x="945" y="392" width="185" height="56" rx="12" fill="url(#nodeGrad)" stroke="#34D399" stroke-opacity="0.4" stroke-width="1.2"/>
      <rect x="957" y="403" width="34" height="34" rx="9" fill="#34D399" fill-opacity="0.16" stroke="#34D399" stroke-opacity="0.5"/>
      <g transform="translate(974,420)" stroke="#34D399" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M-8,5 L-2,-1 L2,3 L8,-5"/><path d="M4,-5 L8,-5 L8,-1"/>
      </g>
      <text x="1003" y="418" font-size="15" font-weight="600" fill="#EAEAF2">Revenue</text>
      <text x="1003" y="434" font-size="11" fill="#8A8A9E" font-family="'SFMono-Regular',Consolas,monospace">attribution</text>
    </g>

    <!-- ================= PORTS ================= -->
    <g fill="#0B0B12" stroke-width="1.5">
      <circle cx="240" cy="160" r="3.4" stroke="#EA4B71"/><circle cx="240" cy="260" r="3.4" stroke="#EA4B71"/><circle cx="240" cy="360" r="3.4" stroke="#EA4B71"/>
      <circle cx="485" cy="260" r="3.8" stroke="#8B5CF6"/><circle cx="715" cy="260" r="3.8" stroke="#8B5CF6"/>
      <circle cx="945" cy="120" r="3.4" stroke="#38BDF8"/><circle cx="945" cy="220" r="3.4" stroke="#2DD4BF"/><circle cx="945" cy="320" r="3.4" stroke="#FBBF24"/><circle cx="945" cy="420" r="3.4" stroke="#34D399"/>
    </g>

    <!-- ================= FLOWING DATA PACKETS ================= -->
    <!-- fan-in (coral) -->
    <g filter="url(#glow)">
      <circle r="4" fill="#EA4B71"><animateMotion dur="3s" begin="0s"    repeatCount="indefinite"><mpath xlink:href="#c1"/></animateMotion></circle>
      <circle r="4" fill="#EA4B71"><animateMotion dur="3s" begin="-1.5s" repeatCount="indefinite"><mpath xlink:href="#c1"/></animateMotion></circle>
      <circle r="4" fill="#EA4B71"><animateMotion dur="3s" begin="0.5s"  repeatCount="indefinite"><mpath xlink:href="#c2"/></animateMotion></circle>
      <circle r="4" fill="#EA4B71"><animateMotion dur="3s" begin="-1s"   repeatCount="indefinite"><mpath xlink:href="#c2"/></animateMotion></circle>
      <circle r="4" fill="#EA4B71"><animateMotion dur="3s" begin="1s"    repeatCount="indefinite"><mpath xlink:href="#c3"/></animateMotion></circle>
      <circle r="4" fill="#EA4B71"><animateMotion dur="3s" begin="-0.5s" repeatCount="indefinite"><mpath xlink:href="#c3"/></animateMotion></circle>
    </g>
    <!-- fan-out (per destination color) -->
    <g filter="url(#glow)">
      <circle r="4" fill="#38BDF8"><animateMotion dur="3.2s" begin="0.2s"  repeatCount="indefinite"><mpath xlink:href="#c4"/></animateMotion></circle>
      <circle r="4" fill="#38BDF8"><animateMotion dur="3.2s" begin="-1.4s" repeatCount="indefinite"><mpath xlink:href="#c4"/></animateMotion></circle>
      <circle r="4" fill="#2DD4BF"><animateMotion dur="3.2s" begin="0.6s"  repeatCount="indefinite"><mpath xlink:href="#c5"/></animateMotion></circle>
      <circle r="4" fill="#2DD4BF"><animateMotion dur="3.2s" begin="-1s"   repeatCount="indefinite"><mpath xlink:href="#c5"/></animateMotion></circle>
      <circle r="4" fill="#FBBF24"><animateMotion dur="3.2s" begin="1s"    repeatCount="indefinite"><mpath xlink:href="#c6"/></animateMotion></circle>
      <circle r="4" fill="#FBBF24"><animateMotion dur="3.2s" begin="-0.6s" repeatCount="indefinite"><mpath xlink:href="#c6"/></animateMotion></circle>
      <circle r="4" fill="#34D399"><animateMotion dur="3.2s" begin="1.4s"  repeatCount="indefinite"><mpath xlink:href="#c7"/></animateMotion></circle>
      <circle r="4" fill="#34D399"><animateMotion dur="3.2s" begin="-0.2s" repeatCount="indefinite"><mpath xlink:href="#c7"/></animateMotion></circle>
    </g>
  </g>
</svg>
