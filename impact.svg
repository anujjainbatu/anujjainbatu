<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 150" width="1200" height="150" preserveAspectRatio="xMidYMid meet" font-family="'Segoe UI',-apple-system,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="c-coral" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#FF9E6D"/><stop offset="1" stop-color="#EA4B71"/></linearGradient>
    <linearGradient id="c-blue"  x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#60D4FA"/><stop offset="1" stop-color="#38BDF8"/></linearGradient>
    <linearGradient id="c-teal"  x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#5EEAD4"/><stop offset="1" stop-color="#2DD4BF"/></linearGradient>
    <linearGradient id="c-green" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6EE7B7"/><stop offset="1" stop-color="#34D399"/></linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#191922"/><stop offset="1" stop-color="#111119"/></linearGradient>
  </defs>

  <!-- card generator: 4 cards, x = 36 + i*288 -->
  <!-- CARD 1 -->
  <g transform="translate(36,20)">
    <animateTransform attributeName="transform" type="translate" values="36,20;36,16;36,20" dur="4s" begin="0s" repeatCount="indefinite"/>
    <rect width="264" height="110" rx="14" fill="url(#cardBg)" stroke="#EA4B71" stroke-opacity="0.28" stroke-width="1.2"/>
    <rect width="264" height="3" rx="1.5" fill="url(#c-coral)"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite"/></rect>
    <text x="22" y="60" font-size="40" font-weight="800" fill="url(#c-coral)">≈ ₹15L</text>
    <rect x="24" y="70" height="2.6" rx="1.3" fill="#EA4B71" opacity="0.55"><animate attributeName="width" values="26;78;26" dur="3s" repeatCount="indefinite"/></rect>
    <text x="24" y="92" font-size="12.5" fill="#9A9AB0">/month attributed revenue</text>
    <text x="24" y="108" font-size="11" fill="#63637A" font-family="'SFMono-Regular',Consolas,monospace">One Science Nutrition</text>
  </g>

  <!-- CARD 2 -->
  <g transform="translate(324,20)">
    <animateTransform attributeName="transform" type="translate" values="324,20;324,16;324,20" dur="4s" begin="0.6s" repeatCount="indefinite"/>
    <rect width="264" height="110" rx="14" fill="url(#cardBg)" stroke="#38BDF8" stroke-opacity="0.28" stroke-width="1.2"/>
    <rect width="264" height="3" rx="1.5" fill="url(#c-blue)"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" begin="0.4s" repeatCount="indefinite"/></rect>
    <text x="22" y="60" font-size="40" font-weight="800" fill="url(#c-blue)">8</text>
    <rect x="24" y="70" height="2.6" rx="1.3" fill="#38BDF8" opacity="0.55"><animate attributeName="width" values="26;78;26" dur="3s" begin="0.4s" repeatCount="indefinite"/></rect>
    <text x="24" y="92" font-size="12.5" fill="#9A9AB0">Shopify stores automated</text>
    <text x="24" y="108" font-size="11" fill="#63637A" font-family="'SFMono-Regular',Consolas,monospace">AI commerce platform</text>
  </g>

  <!-- CARD 3 -->
  <g transform="translate(612,20)">
    <animateTransform attributeName="transform" type="translate" values="612,20;612,16;612,20" dur="4s" begin="1.2s" repeatCount="indefinite"/>
    <rect width="264" height="110" rx="14" fill="url(#cardBg)" stroke="#2DD4BF" stroke-opacity="0.28" stroke-width="1.2"/>
    <rect width="264" height="3" rx="1.5" fill="url(#c-teal)"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" begin="0.8s" repeatCount="indefinite"/></rect>
    <text x="22" y="60" font-size="40" font-weight="800" fill="url(#c-teal)">6</text>
    <rect x="24" y="70" height="2.6" rx="1.3" fill="#2DD4BF" opacity="0.55"><animate attributeName="width" values="26;78;26" dur="3s" begin="0.8s" repeatCount="indefinite"/></rect>
    <text x="24" y="92" font-size="12.5" fill="#9A9AB0">hospitals &amp; clinics live</text>
    <text x="24" y="108" font-size="11" fill="#63637A" font-family="'SFMono-Regular',Consolas,monospace">lead qualification AI</text>
  </g>

  <!-- CARD 4 -->
  <g transform="translate(900,20)">
    <animateTransform attributeName="transform" type="translate" values="900,20;900,16;900,20" dur="4s" begin="1.8s" repeatCount="indefinite"/>
    <rect width="264" height="110" rx="14" fill="url(#cardBg)" stroke="#34D399" stroke-opacity="0.28" stroke-width="1.2"/>
    <rect width="264" height="3" rx="1.5" fill="url(#c-green)"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" begin="1.2s" repeatCount="indefinite"/></rect>
    <text x="22" y="60" font-size="40" font-weight="800" fill="url(#c-green)">14</text>
    <rect x="24" y="70" height="2.6" rx="1.3" fill="#34D399" opacity="0.55"><animate attributeName="width" values="26;78;26" dur="3s" begin="1.2s" repeatCount="indefinite"/></rect>
    <text x="24" y="92" font-size="12.5" fill="#9A9AB0">businesses · revenue intel</text>
    <text x="24" y="108" font-size="11" fill="#63637A" font-family="'SFMono-Regular',Consolas,monospace">unified reporting</text>
  </g>
</svg>
